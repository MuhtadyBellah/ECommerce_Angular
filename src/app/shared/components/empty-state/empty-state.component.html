<div class="flex flex-col items-center justify-center p-12 text-center">
  <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mb-4">
    @if (icon === 'box-open') {
      <svg
        class="w-8 h-8 text-gray-400"
        data-prefix="fas"
        data-icon="box-open"
        role="img"
        viewBox="0 0 512 512"
        aria-hidden="true"
      >
        <path
          fill="currentColor"
          d="M320 80c8.8 0 16-7.2 16-16s-7.2-16-16-16l-160 0c-8.8 0-16 7.2-16 16s7.2 16 16 16l160 0zm-80 64c-8.8 0-16 7.2-16 16s7.2 16 16 16l160 0c8.8 0 16-7.2 16-16s-7.2-16-16-16l-160 0zM192 208c-8.8 0-16 7.2-16 16s7.2 16 16 16l160 0c8.8 0 16-7.2 16-16s-7.2-16-16-16l-160 0zM48 240c0-35.3 28.7-64 64-64l64 0c35.3 0 64 28.7 64 64l0 96c0 35.3-28.7 64-64 64l-64 0c-35.3 0-64-28.7-64-64l0-96zm64-32c-17.7 0-32 14.3-32 32l0 96c0 17.7 14.3 32 32 32l64 0c17.7 0 32-14.3 32-32l0-96c0-17.7-14.3-32-32-32l-64 0z"
        ></path>
      </svg>
    } @else if (icon === 'exclamation-triangle') {
      <svg
        class="w-8 h-8 text-gray-400"
        data-prefix="fas"
        data-icon="exclamation-triangle"
        role="img"
        viewBox="0 0 512 512"
        aria-hidden="true"
      >
        <path
          fill="currentColor"
          d="M256 32c14.2 0 27.3 7.5 34.5 19.8l216 368c7.3 12.4 7.3 27.7 .2 40.1S486.3 480 472 480L40 480c-14.3 0-27.6-7.7-34.7-20.1s-7-27.8 .2-40.1l216-368C228.7 39.5 241.8 32 256 32zm0 128c-13.3 0-24 10.7-24 24l0 112c0 13.3 10.7 24 24 24s24-10.7 24-24l0-112c0-13.3-10.7-24-24-24zm32 224a32 32 0 1 0 -64 0 32 32 0 1 0 64 0z"
        ></path>
      </svg>
    } @else if (icon === 'folder-open') {
      <svg
        class="w-8 h-8 text-gray-400"
        data-prefix="fas"
        data-icon="folder-open"
        role="img"
        viewBox="0 0 512 512"
        aria-hidden="true"
      >
        <path
          fill="currentColor"
          d="M64 480l384 0c35.3 0 64-28.7 64-64l0-320c0-35.3-28.7-64-64-64l-192 0c-8.8 0-16-7.2-16-16s7.2-16 16-16l192 0c53 0 96 43 96 96l0 320c0 53-43 96-96 96L64 480c-53 0-96-43-96-96L-32 64c0-53 43-96 96-96l192 0c8.8 0 16 7.2 16 16s-7.2 16-16 16L64 0c-35.3 0-64 28.7-64 64l0 320c0 35.3 28.7 64 64 64z"
        ></path>
      </svg>
    } @else {
      <svg
        class="w-8 h-8 text-gray-400"
        data-prefix="fas"
        data-icon="box-open"
        role="img"
        viewBox="0 0 512 512"
        aria-hidden="true"
      >
        <path
          fill="currentColor"
          d="M320 80c8.8 0 16-7.2 16-16s-7.2-16-16-16l-160 0c-8.8 0-16 7.2-16 16s7.2 16 16 16l160 0zm-80 64c-8.8 0-16 7.2-16 16s7.2 16 16 16l160 0c8.8 0 16-7.2 16-16s-7.2-16-16-16l-160 0zM192 208c-8.8 0-16 7.2-16 16s7.2 16 16 16l160 0c8.8 0 16-7.2 16-16s-7.2-16-16-16l-160 0zM48 240c0-35.3 28.7-64 64-64l64 0c35.3 0 64 28.7 64 64l0 96c0 35.3-28.7 64-64 64l-64 0c-35.3 0-64-28.7-64-64l0-96zm64-32c-17.7 0-32 14.3-32 32l0 96c0 17.7 14.3 32 32 32l64 0c17.7 0 32-14.3 32-32l0-96c0-17.7-14.3-32-32-32l-64 0z"
        ></path>
      </svg>
    }
  </div>
  <h3 class="text-lg font-semibold text-gray-900 mb-2">{{ title }}</h3>
  <p class="text-gray-500 mb-6 max-w-md">{{ description }}</p>
  @if (actionText && actionRouterLink) {
    <a
      class="inline-flex items-center gap-2 bg-primary-600 hover:bg-primary-700 text-white px-6 py-3 rounded-lg font-medium transition-colors"
      [routerLink]="actionRouterLink"
    >
      {{ actionText }}
      <svg
        class="w-4 h-4"
        data-prefix="fas"
        data-icon="arrow-right"
        role="img"
        viewBox="0 0 512 512"
        aria-hidden="true"
      >
        <path
          fill="currentColor"
          d="M502.6 278.6c12.5-12.5 12.5-32.8 0-45.3l-160-160c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L402.7 224 32 224c-17.7 0-32 14.3-32 32s14.3 32 32 32l370.7 0-105.4 105.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0l160-160z"
        ></path>
      </svg>
    </a>
  }
</div>
