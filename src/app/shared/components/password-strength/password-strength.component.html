@if (password()) {
  <div class="password-requirements mt-2 space-y-1">
    <div class="mb-1 text-sm font-medium" [ngClass]="config().labelClass">
      {{ config().label }}
    </div>
    <div class="w-full bg-neutral-quaternary rounded-full h-2">
      <div
        class="h-2 rounded-full transition-all duration-500"
        [ngClass]="config().barClass"
        [style.width.%]="config().percentage"
      ></div>
    </div>
  </div>
}
