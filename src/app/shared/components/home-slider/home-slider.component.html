<div
  class="relative w-full h-125 overflow-hidden rounded-3xl"
  (mouseenter)="pause()"
  (mouseleave)="resume()"
  (touchstart)="onTouchStart($event)"
  (touchend)="onTouchEnd($event)"
>
  <!-- Slides -->
  <div class="h-full relative">
    @for (slide of slides; track i; let i = $index) {
      <div
        class="absolute inset-0 transition-all duration-700 ease-in-out"
        [class.opacity-0]="currentIndex() !== i"
        [class.opacity-100]="currentIndex() === i"
      >
        <!-- Image -->
        <img
          [src]="slide.image"
          loading="lazy"
          class="w-full h-full object-cover scale-105 transition-transform duration-700"
        />

        <!-- Overlay -->
        <div
          class="absolute inset-0 bg-linear-to-r from-black/70 via-black/40 to-transparent"
        ></div>

        <!-- Content -->
        <div class="absolute inset-0 flex items-center px-10">
          <div class="text-white max-w-lg space-y-4">
            <!-- Badge -->
            <span class="px-3 py-1 text-xs rounded-full bg-white/20 backdrop-blur-md">
              {{ slide.badge }}
            </span>

            <!-- Title -->
            <h2 class="text-4xl font-bold leading-tight">
              {{ slide.title }}
            </h2>

            <!-- Subtitle -->
            <p class="text-lg opacity-90">
              {{ slide.subtitle }}
            </p>

            <!-- Description -->
            <p class="text-sm opacity-70">
              {{ slide.desc }}
            </p>

            <!-- Buttons -->
            <div class="flex gap-4 mt-4">
              <a
                [routerLink]="slide.primaryLink"
                class="px-6 py-3 bg-green-500 hover:bg-green-600 transition rounded-xl font-semibold shadow-lg"
              >
                {{ slide.primaryText }}
              </a>

              <a
                [routerLink]="slide.secondaryLink"
                class="px-6 py-3 bg-white/20 hover:bg-white/30 backdrop-blur rounded-xl"
              >
                {{ slide.secondaryText }}
              </a>
            </div>
          </div>
        </div>
      </div>
    }
  </div>

  <!-- Arrows -->
  <button
    (click)="prev()"
    class="absolute left-4 top-1/2 -translate-y-1/2 bg-white/20 hover:bg-white/40 p-3 rounded-full backdrop-blur transition"
  >
    ‹
  </button>

  <button
    (click)="next()"
    class="absolute right-4 top-1/2 -translate-y-1/2 bg-white/20 hover:bg-white/40 p-3 rounded-full backdrop-blur transition"
  >
    ›
  </button>

  <!-- Dots -->
  <div class="absolute bottom-5 w-full flex justify-center gap-2">
    @for (slide of slides; track i; let i = $index) {
      <span
        (click)="goToSlide(i)"
        class="w-3 h-3 rounded-full cursor-pointer transition-all"
        [class.bg-white]="currentIndex() === i"
        [class.bg-white/40]="currentIndex() !== i"
      ></span>
    }
  </div>
</div>
