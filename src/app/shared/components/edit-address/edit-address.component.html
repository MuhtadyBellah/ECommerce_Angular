<div class="fixed inset-0 z-50 flex items-center justify-center p-4" (mousedown)="onClose()">
  <!-- overlay -->
  <div class="absolute inset-0 bg-black/50 backdrop-blur-sm" (click)="onClose()"></div>

  <!-- modal -->
  <div
    class="relative bg-white rounded-3xl shadow-2xl w-full max-w-lg p-6 sm:p-8"
    (click)="$event.stopPropagation()"
  >
    <div class="flex items-center justify-between mb-6">
      <h2 class="text-xl font-bold text-gray-900">
        {{ mode() === 'add' ? 'Add New Address' : 'Edit Address' }}
      </h2>
      <button
        class="w-9 h-9 rounded-lg bg-gray-100 text-gray-600 hover:bg-gray-200 flex items-center justify-center transition-colors"
        fdprocessedid="lpg3gh"
        (click)="onClose()"
      >
        <svg
          data-prefix="fas"
          data-icon="xmark"
          class="svg-inline--fa fa-xmark"
          role="img"
          viewBox="0 0 384 512"
          aria-hidden="true"
        >
          <path
            fill="currentColor"
            d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z"
          ></path>
        </svg>
      </button>
    </div>
    <form class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Address Name</label
        ><input
          placeholder="e.g. Home, Office"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all"
          required=""
          type="text"
          formControlName="name"
          fdprocessedid="x28qx7"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Full Address</label
        ><textarea
          placeholder="Street, building, apartment..."
          rows="3"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all resize-none"
          [required]="mode() === 'add'"
          formControlName="details"
        ></textarea>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Phone Number</label
          ><input
            placeholder="01xxxxxxxxx"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all"
            required=""
            type="tel"
            formControlName="phone"
            fdprocessedid="jhhbr"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">City</label
          ><input
            placeholder="Cairo"
            class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all"
            required=""
            type="text"
            formControlName="city"
            fdprocessedid="z4cn3"
          />
        </div>
      </div>
      <div class="flex items-center gap-3 pt-4">
        <button
          type="button"
          class="flex-1 py-3 px-6 rounded-xl bg-gray-100 text-gray-700 font-semibold hover:bg-gray-200 transition-colors"
          fdprocessedid="7i799g"
          (click)="onClose()"
        >
          Cancel</button
        ><button
          type="submit"
          class="flex-1 py-3 px-6 rounded-xl bg-primary text-white font-semibold hover:bg-primary transition-colors disabled:opacity-50 shadow-lg shadow-primary/25"
          fdprocessedid="zcnwt"
        >
          {{ mode() === 'add' ? 'Add Address' : 'Edit Address' }}
        </button>
      </div>
    </form>
  </div>
</div>
