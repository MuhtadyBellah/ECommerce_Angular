<div class="bg-white rounded-2xl shadow-xl p-8 lg:p-12">
  <div class="text-center mb-8">
    <div class="flex items-center justify-center mb-4">
      <span class="text-3xl font-bold text-primary-600"
        >Fresh<span class="text-gray-800">Cart</span></span
      >
    </div>
    <h1 class="text-2xl font-bold text-gray-800 mb-2">Check Your Email</h1>
    <p class="text-gray-600">Enter the 6-digit code sent to muhybellah@gmail.com</p>
  </div>
  <div class="flex items-center justify-center mb-8">
    <div class="flex items-center">
      <div
        class="w-10 h-10 rounded-full flex items-center justify-center text-sm font-semibold transition-all duration-300 bg-primary-600"
      >
        <svg
          data-prefix="fas"
          data-icon="check"
          class="svg-inline--fa fa-check"
          role="img"
          viewBox="0 0 448 512"
          aria-hidden="true"
        >
          <path
            fill="currentColor"
            d="M434.8 70.1c14.3 10.4 17.5 30.4 7.1 44.7l-256 352c-5.5 7.6-14 12.3-23.4 13.1s-18.5-2.7-25.1-9.3l-128-128c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0l101.5 101.5 234-321.7c10.4-14.3 30.4-17.5 44.7-7.1z"
          ></path>
        </svg>
      </div>
      <div class="w-16 h-0.5 mx-2 transition-all duration-300 bg-primary-600"></div>
    </div>
    <div class="flex items-center">
      <div
        class="w-10 h-10 rounded-full flex items-center justify-center text-sm font-semibold transition-all duration-300 bg-primary-600 ring-4 ring-primary-100"
      >
        <svg
          data-prefix="fas"
          data-icon="key"
          class="svg-inline--fa fa-key text-xs"
          role="img"
          viewBox="0 0 512 512"
          aria-hidden="true"
        >
          <path
            fill="currentColor"
            d="M336 352c97.2 0 176-78.8 176-176S433.2 0 336 0 160 78.8 160 176c0 18.7 2.9 36.8 8.3 53.7L7 391c-4.5 4.5-7 10.6-7 17l0 80c0 13.3 10.7 24 24 24l80 0c13.3 0 24-10.7 24-24l0-40 40 0c13.3 0 24-10.7 24-24l0-40 40 0c6.4 0 12.5-2.5 17-7l33.3-33.3c16.9 5.4 35 8.3 53.7 8.3zM376 96a40 40 0 1 1 0 80 40 40 0 1 1 0-80z"
          ></path>
        </svg>
      </div>
      <div class="w-16 h-0.5 mx-2 transition-all duration-300 bg-gray-200"></div>
    </div>
    <div class="flex items-center">
      <div
        class="w-10 h-10 rounded-full flex items-center justify-center text-sm font-semibold transition-all duration-300 bg-gray-100 text-gray-400"
      >
        <svg
          data-prefix="fas"
          data-icon="lock"
          class="svg-inline--fa fa-lock text-xs"
          role="img"
          viewBox="0 0 384 512"
          aria-hidden="true"
        >
          <path
            fill="currentColor"
            d="M128 96l0 64 128 0 0-64c0-35.3-28.7-64-64-64s-64 28.7-64 64zM64 160l0-64C64 25.3 121.3-32 192-32S320 25.3 320 96l0 64c35.3 0 64 28.7 64 64l0 224c0 35.3-28.7 64-64 64L64 512c-35.3 0-64-28.7-64-64L0 224c0-35.3 28.7-64 64-64z"
          ></path>
        </svg>
      </div>
    </div>
  </div>
  <form class="space-y-6" [formGroup]="resetForm" (ngSubmit)="onSubmit()">
    <div>
      <label
        for="resetCode"
        class="block text-sm font-semibold mb-2"
        [ngClass]="
          hasFieldError('email')
            ? 'text-red-500 peer-focus:text-red-600'
            : 'text-gray-500 peer-focus:text-blue-600'
        "
      >
        Verification Code
      </label>
      @if (getFieldError('email')) {
        <p class="mt-1 text-xs text-red-500">{{ getFieldError('email') }}</p>
      }
      <div class="relative">
        <input
          id="resetCode"
          maxlength="6"
          class="w-full px-4 py-3 pl-12 border-2 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-100 transition-all text-center text-2xl tracking-[0.5em] font-mono"
          placeholder="••••••"
          type="text"
          name="resetCode"
          formControlName="code"
          [ngClass]="
            hasFieldError('email')
              ? 'border-red-500 focus:border-red-600'
              : 'border-gray-300 focus:border-blue-600'
          "
        /><svg
          data-prefix="fas"
          data-icon="shield-halved"
          class="svg-inline--fa fa-shield-halved absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"
          role="img"
          viewBox="0 0 512 512"
          aria-hidden="true"
        >
          <path
            fill="currentColor"
            d="M256 0c4.6 0 9.2 1 13.4 2.9L457.8 82.8c22 9.3 38.4 31 38.3 57.2-.5 99.2-41.3 280.7-213.6 363.2-16.7 8-36.1 8-52.8 0-172.4-82.5-213.1-264-213.6-363.2-.1-26.2 16.3-47.9 38.3-57.2L242.7 2.9C246.9 1 251.4 0 256 0zm0 66.8l0 378.1c138-66.8 175.1-214.8 176-303.4l-176-74.6 0 0z"
          ></path>
        </svg>
      </div>
    </div>
    <div class="text-center">
      <p class="text-sm text-gray-500">
        Didn't receive the code?
        <button
          [disabled]="isSubmitDisabled()"
          type="button"
          class="text-primary-600 cursor-pointer hover:text-primary-700 font-semibold transition-colors"
          (click)="resendCode()"
        >
          Resend Code
        </button>
      </p>
    </div>
    <button
      [disabled]="isSubmitDisabled()"
      type="submit"
      class="w-full cursor-pointer bg-primary-600 py-3 px-4 rounded-xl hover:bg-primary-700 transition-all duration-200 font-semibold text-lg shadow-lg hover:shadow-xl disabled:opacity-50 disabled:cursor-not-allowed"
    >
      @if (isLoading()) {
        <i class="animate-spin fas fa-spinner"></i>
        <span>Verifyng Code...</span>
      } @else {
        Verify Code
      }
    </button>
    <div class="text-center">
      <button
        type="button"
        class="inline-flex cursor-pointer items-center gap-2 text-sm text-gray-500 hover:text-primary-600 font-medium transition-colors"
        routerLink="/password"
      >
        <svg
          data-prefix="fas"
          data-icon="arrow-left"
          class="svg-inline--fa fa-arrow-left text-xs"
          role="img"
          viewBox="0 0 512 512"
          aria-hidden="true"
        >
          <path
            fill="currentColor"
            d="M9.4 233.4c-12.5 12.5-12.5 32.8 0 45.3l160 160c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L109.3 288 480 288c17.7 0 32-14.3 32-32s-14.3-32-32-32l-370.7 0 105.4-105.4c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0l-160 160z"
          ></path></svg
        >Change email address
      </button>
    </div>
  </form>
</div>
