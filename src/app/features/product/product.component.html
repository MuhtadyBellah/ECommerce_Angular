<section>
  <div class="min-h-screen bg-gray-50/50">
    <div class="bg-linear-to-br from-primary-600 via-primary-500 to-primary-400">
      <div class="container mx-auto px-4 py-10 sm:py-14">
        <app-page-header
          title="All Products"
          subtitle="Explore our complete product collection"
          icon="box-open"
          [breadcrumbItems]="[{ label: 'Home', link: '/' }, { label: 'All Products' }]"
        ></app-page-header>
      </div>
    </div>
    @if (loading()) {
      <app-loading-spinner size="large" text="Loading products..."></app-loading-spinner>
    } @else if (error()) {
      <app-empty-state
        icon="exclamation-triangle"
        title="Error Loading Products"
        description="{{ error() }}"
        actionText="Try Again"
        (click)="retry()"
      ></app-empty-state>
    } @else if (products().length === 0) {
      <app-empty-state
        icon="box-open"
        title="No Products Found"
        description="There are no products available at the moment."
        actionText="Browse Categories"
        actionRouterLink="/categories"
      ></app-empty-state>
    } @else {
      <div class="container mx-auto px-4 py-8">
        <div class="mb-6 flex items-center gap-3 flex-wrap">
          <span class="flex items-center gap-2 text-sm text-gray-600"
            ><svg
              data-prefix="fas"
              data-icon="filter"
              class="svg-inline--fa fa-filter"
              role="img"
              viewBox="0 0 512 512"
              aria-hidden="true"
            >
              <path
                fill="currentColor"
                d="M32 64C19.1 64 7.4 71.8 2.4 83.8S.2 109.5 9.4 118.6L192 301.3 192 416c0 8.5 3.4 16.6 9.4 22.6l64 64c9.2 9.2 22.9 11.9 34.9 6.9S320 492.9 320 480l0-178.7 182.6-182.6c9.2-9.2 11.9-22.9 6.9-34.9S492.9 64 480 64L32 64z"
              ></path></svg
            >Active Filters:</span
          ><a
            class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-emerald-100 text-emerald-700 text-sm font-medium hover:bg-emerald-200 transition-colors"
            routerLink="/products"
            ><svg
              data-prefix="fas"
              data-icon="folder-open"
              class="svg-inline--fa fa-folder-open text-xs"
              role="img"
              viewBox="0 0 576 512"
              aria-hidden="true"
            >
              <path
                fill="currentColor"
                d="M56 225.6L32.4 296.2 32.4 96c0-35.3 28.7-64 64-64l138.7 0c13.8 0 27.3 4.5 38.4 12.8l38.4 28.8c5.5 4.2 12.3 6.4 19.2 6.4l117.3 0c35.3 0 64 28.7 64 64l0 16-365.4 0c-41.3 0-78 26.4-91.1 65.6zM477.8 448L99 448c-32.8 0-55.9-32.1-45.5-63.2l48-144C108 221.2 126.4 208 147 208l378.8 0c32.8 0 55.9 32.1 45.5 63.2l-48 144c-6.5 19.6-24.9 32.8-45.5 32.8z"
              ></path></svg
            >Kid's Fashion<svg
              data-prefix="fas"
              data-icon="xmark"
              class="svg-inline--fa fa-xmark text-xs"
              role="img"
              viewBox="0 0 384 512"
              aria-hidden="true"
            >
              <path
                fill="currentColor"
                d="M55.1 73.4c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L147.2 256 9.9 393.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L192.5 301.3 329.9 438.6c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L237.8 256 375.1 118.6c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0L192.5 210.7 55.1 73.4z"
              ></path>
            </svg>
          </a>
          <a class="text-sm text-gray-500 hover:text-gray-700 underline" routerLink="/products"
            >Clear all</a
          >
        </div>
        <!-- Products Header with Filters -->
        <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between mb-8 gap-4">
          <div>
            <h2 class="text-2xl font-bold text-gray-900 mb-2">All Products</h2>
            <p class="text-sm text-gray-600">Showing {{ sortedProducts().length }} products</p>
          </div>

          <!-- Sort and View Options -->
          <div class="flex items-center gap-3">
            <div class="relative">
              <select
                class="appearance-none bg-white border border-gray-200 rounded-lg px-4 py-2 pr-8 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500/20 focus:border-primary-500"
                [value]="selectedSort()"
                (change)="onSortChange($event)"
              >
                @for (option of sortOptions; track option.value) {
                  <option [value]="option.value">{{ option.label }}</option>
                }
              </select>
              <svg
                class="absolute right-2 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19 9l-7 7-7-7"
                />
              </svg>
            </div>
          </div>
        </div>

        <!-- Enhanced Product Grid -->
        <div
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6 lg:gap-8"
        >
          @for (product of sortedProducts(); track product._id) {
            <div class="transform transition-all duration-300 hover:scale-105">
              <app-product-card
                [product]="product"
                [isWishlisted]="product.isFavorite || false"
                (addFavorite)="addFavorite($event)"
              ></app-product-card>
            </div>
          }
        </div>

        <!-- Load More Button -->
        <div class="flex justify-center mt-12">
          <button
            class="inline-flex items-center gap-2 bg-primary-600 hover:bg-primary-700 font-medium px-8 py-3 rounded-xl transition-colors duration-200 shadow-lg hover:shadow-xl hover:shadow-primary-600/25"
          >
            <span>Load More Products</span>
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 6v6m0 0v6m0-6h6m-6 0H6"
              />
            </svg>
          </button>
        </div>
      </div>
    }
  </div>
</section>
