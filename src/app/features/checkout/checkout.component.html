<section>
  <div class="max-w-6xl py-10 mx-auto">
    <!-- ? ------------- header information  -->
    <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
      <div>
        <h1 class="text-3xl font-bold text-gray-900 flex items-center gap-3">
          <span
            class="bg-brand-700 text-white w-9 h-9 flex items-center justify-center rounded-md text-lg"
          >
            <i class="fa-solid fa-receipt"></i>
          </span>
          Complete Your Order
        </h1>
        <p class="text-gray-500 mt-1">Review your items and complete your purchase</p>
      </div>
      <a
        routerLink="/cart"
        class="text-brand-600 hover:text-brand-800 font-medium flex items-center gap-2 transition-colors"
      >
        <i class="fa-solid fa-arrow-left-long"></i>
        Back to Cart
      </a>
    </div>

    <!-- ? ------------- Form   -->
    <div class="space-y-6">
      <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="p-6">
          @if (errorMessage()) {
            <app-alert type="danger" title="Login Failed:" [message]="errorMessage()"></app-alert>
          }
          <form class="space-y-5" [formGroup]="checkoutForm" (ngSubmit)="onSubmit()">
            <div>
              <!-- city  -->
              <div>
                <label
                  for="city"
                  class="block mb-2 text-sm font-medium"
                  [ngClass]="
                    checkoutForm.get('city')?.touched && checkoutForm.get('city')?.invalid
                      ? 'text-red-500 peer-focus:text-red-600'
                      : 'text-gray-500 peer-focus:text-blue-600'
                  "
                  >City
                  @if (getFieldError('city')) {
                    <p class="mt-1 text-xs text-red-500">{{ getFieldError('city') }}</p>
                  }
                </label>
                <div class="relative">
                  <div
                    class="absolute inset-y-0 inset-s-0 flex items-center ps-3.5 pointer-events-none text-gray-400"
                  >
                    <i class="fa-solid fa-city"></i>
                  </div>
                  <input
                    type="text"
                    id="city"
                    formControlName="city"
                    class="bg-white border text-gray-900 text-sm rounded-lg focus:ring-brand-500 block w-full ps-10 p-3"
                    placeholder="e.g. Cairo, Alexandria, Giza"
                    required
                    [ngClass]="
                      checkoutForm.get('city')?.touched && checkoutForm.get('city')?.invalid
                        ? 'border-red-500'
                        : 'border-gray-300'
                    "
                    [ngClass]="
                      checkoutForm.get('city')?.touched && checkoutForm.get('city')?.invalid
                        ? 'focus:border-red-600'
                        : 'focus:border-blue-600'
                    "
                  />
                </div>
              </div>

              <!-- Street Address   -->

              <div>
                <label
                  for="address"
                  class="block mb-2 text-sm font-medium"
                  [ngClass]="
                    checkoutForm.get('address')?.touched && checkoutForm.get('address')?.invalid
                      ? 'text-red-500 peer-focus:text-red-600'
                      : 'text-gray-500 peer-focus:text-blue-600'
                  "
                  >Street Address <span class="text-red-500">*</span>
                  @if (getFieldError('address')) {
                    <p class="mt-1 text-xs text-red-500">{{ getFieldError('address') }}</p>
                  }
                </label>
                <div class="relative">
                  <div
                    class="absolute inset-y-0 inset-s-0 flex items-center ps-3.5 pointer-events-none text-gray-400"
                  >
                    <i class="fa-solid fa-location-dot"></i>
                  </div>
                  <textarea
                    id="address"
                    formControlName="address"
                    class="bg-white border text-gray-900 text-sm rounded-lg focus:ring-brand-500 block w-full ps-10 p-3"
                    placeholder="Street name, building number, floor, apartment..."
                    required
                    [ngClass]="
                      checkoutForm.get('address')?.touched && checkoutForm.get('address')?.invalid
                        ? 'border-red-500'
                        : 'border-gray-300'
                    "
                    [ngClass]="
                      checkoutForm.get('address')?.touched && checkoutForm.get('address')?.invalid
                        ? 'focus:border-red-600'
                        : 'focus:border-blue-600'
                    "
                  ></textarea>
                </div>
              </div>

              <!-- phone  -->

              <div>
                <label
                  for="phone"
                  class="block mb-2 text-sm font-medium"
                  [ngClass]="
                    checkoutForm.get('phone')?.touched && checkoutForm.get('phone')?.invalid
                      ? 'text-red-500 peer-focus:text-red-600'
                      : 'text-gray-500 peer-focus:text-blue-600'
                  "
                  >Phone Number <span class="text-red-500">*</span>
                  @if (getFieldError('phone')) {
                    <p class="mt-1 text-xs text-red-500">{{ getFieldError('phone') }}</p>
                  }
                </label>
                <div class="relative">
                  <div
                    class="absolute inset-y-0 inset-s-0 flex items-center ps-3.5 pointer-events-none text-gray-400"
                  >
                    <i class="fa-solid fa-phone"></i>
                  </div>
                  <input
                    type="tel"
                    id="phone"
                    formControlName="phone"
                    class="bg-white border text-gray-900 text-sm rounded-lg focus:ring-brand-500 block w-full ps-10 p-3"
                    placeholder="01xxxxxxxxx"
                    required
                    [ngClass]="
                      checkoutForm.get('phone')?.touched && checkoutForm.get('phone')?.invalid
                        ? 'border-red-500'
                        : 'border-gray-300'
                    "
                    [ngClass]="
                      checkoutForm.get('phone')?.touched && checkoutForm.get('phone')?.invalid
                        ? 'focus:border-red-600'
                        : 'focus:border-blue-600'
                    "
                  />
                  <div
                    class="absolute inset-y-0 inset-e-0 flex items-center pe-3 pointer-events-none"
                  >
                    <span class="text-xs text-gray-400">Egyptian numbers only</span>
                  </div>
                </div>
              </div>

              <!-- buttons payment  -->
              <div class="group grid pt-3 md:grid-cols-3 gap-8">
                <div class="md:col-span-2 space-y-6">
                  <div class="space-y-4">
                    <label for="payment-cod" class="block relative">
                      <input
                        type="radio"
                        id="payment-cod"
                        name="payment_method"
                        value="cash"
                        class="peer sr-only"
                        checked
                        (change)="changePaymentMethod()"
                      />

                      <div
                        class="p-5 bg-white border-2 border-gray-200 rounded-2xl cursor-pointer transition-all duration-200 ease-in-out peer-checked:border-green-500 peer-checked:bg-green-50/50 hover:border-green-300"
                      >
                        <div class="flex items-center justify-between gap-4">
                          <div class="flex items-center gap-4 grow">
                            <div
                              class="w-14 h-14 bg-green-500 text-white rounded-xl flex items-center justify-center transition-colors peer-checked:bg-green-500"
                            >
                              <i class="fas fa-money-bill-wave text-xl"></i>
                            </div>
                            <div>
                              <h3 class="font-bold text-lg text-green-800">Cash on Delivery</h3>
                              <p class="text-sm text-gray-500">
                                Pay when your order arrives at your doorstep
                              </p>
                            </div>
                          </div>
                        </div>
                      </div>
                    </label>

                    <label for="payment-card" class="block relative">
                      <input
                        type="radio"
                        id="payment-card"
                        name="payment_method"
                        value="visa"
                        class="peer sr-only"
                        (change)="changePaymentMethod()"
                      />

                      <div
                        class="p-5 bg-white border-2 border-gray-200 rounded-2xl cursor-pointer transition-all duration-200 ease-in-out peer-checked:border-green-500 peer-checked:bg-green-50/50 hover:border-green-300"
                      >
                        <div class="flex items-center justify-between gap-4">
                          <div class="flex items-center gap-4 grow">
                            <div
                              class="w-14 h-14 bg-gray-100 text-gray-400 rounded-xl flex items-center justify-center transition-colors peer-checked:bg-blue-500 peer-checked:text-white"
                            >
                              <i class="fas fa-credit-card text-xl"></i>
                            </div>
                            <div>
                              <h3 class="font-bold text-lg text-gray-900">Pay Online</h3>
                              <p class="text-sm text-gray-500">
                                Secure payment with Credit/Debit Card via Stripe
                              </p>
                              <div class="flex items-center gap-2 mt-1">
                                <i class="fab fa-cc-visa text-2xl text-blue-800"></i>
                                <i class="fab fa-cc-mastercard text-2xl text-orange-600"></i>
                                <i class="fab fa-cc-amex text-2xl text-blue-500"></i>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </label>
                  </div>
                </div>

                <!-- 2 buttons  -->
                <div
                  class="md:col-span-1 p-6 bg-white border border-gray-100 rounded-2xl shadow-sm h-fit sticky top-8 space-y-5"
                >
                  <div class="pt-2">
                    @if (isCash()) {
                      <button
                        [disabled]="isSubmitDisabled()"
                        type="submit"
                        class="w-full cursor-pointer py-3.5 px-4 rounded-lg bg-green-600 text-white font-semibold text-sm items-center justify-center gap-2 hover:bg-green-700 transition-colors hidden group-has-[#payment-cod:checked]:flex"
                      >
                        <i class="fas fa-shopping-bag"></i>

                        @if (isLoading()) {
                          <span>progress...</span>
                          <i class="animate-spin fas fa-spinner"></i>
                        } @else {
                          Place Order
                        }
                      </button>
                    } @else {
                      <button
                        [disabled]="isSubmitDisabled()"
                        type="submit"
                        class="w-full cursor-pointer py-3.5 px-4 rounded-lg bg-green-600 text-white font-semibold text-sm items-center justify-center gap-2 hover:bg-green-700 transition-colors hidden group-has-[#payment-card:checked]:flex"
                      >
                        <i class="fas fa-shield-alt"></i>

                        @if (isLoading()) {
                          <span>progress...</span>
                          <i class="animate-spin fas fa-spinner"></i>
                        } @else {
                          Proceed to Payment
                        }
                      </button>
                    }
                  </div>
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
