<div>
  <div class="flex items-center justify-between mb-6">
    <div>
      <h2 class="text-xl font-bold text-gray-900">My Addresses</h2>
      <p class="text-gray-500 text-sm mt-1">Manage your saved delivery addresses</p>
    </div>
    <button
      class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl bg-primary text-white font-semibold hover:bg-primary transition-colors shadow-lg shadow-primary"
      fdprocessedid="e4kuzh"
      (click)="onOpenAddAddress()"
    >
      <svg
        data-prefix="fas"
        data-icon="plus"
        class="svg-inline--fa fa-plus text-sm"
        role="img"
        viewBox="0 0 448 512"
        aria-hidden="true"
      >
        <path
          fill="currentColor"
          d="M256 64c0-17.7-14.3-32-32-32s-32 14.3-32 32l0 160-160 0c-17.7 0-32 14.3-32 32s14.3 32 32 32l160 0 0 160c0 17.7 14.3 32 32 32s32-14.3 32-32l0-160 160 0c17.7 0 32-14.3 32-32s-14.3-32-32-32l-160 0 0-160z"
        ></path></svg
      >Add Address
    </button>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    @for (address of addresses(); track $index) {
      <div
        class="bg-white rounded-2xl border border-gray-100 p-5 shadow-sm hover:shadow-md hover:border-primary transition-all duration-200 group"
      >
        <div class="flex items-start justify-between gap-4">
          <div class="flex items-start gap-4 flex-1">
            <div
              class="w-11 h-11 rounded-xl bg-primary text-white flex items-center justify-center shrink-0 group-hover:bg-primary transition-colors"
            >
              <svg
                data-prefix="fas"
                data-icon="location-dot"
                class="svg-inline--fa fa-location-dot text-lg"
                role="img"
                viewBox="0 0 384 512"
                aria-hidden="true"
              >
                <path
                  fill="currentColor"
                  d="M0 188.6C0 84.4 86 0 192 0S384 84.4 384 188.6c0 119.3-120.2 262.3-170.4 316.8-11.8 12.8-31.5 12.8-43.3 0-50.2-54.5-170.4-197.5-170.4-316.8zM192 256a64 64 0 1 0 0-128 64 64 0 1 0 0 128z"
                ></path>
              </svg>
            </div>
            <div class="flex-1 min-w-0">
              <h3 class="font-bold text-gray-900 mb-1">{{ address.name }}</h3>
              <p class="text-sm text-gray-600 mb-3 line-clamp-2">{{ address.details }}</p>
              <div class="flex flex-wrap items-center gap-4 text-sm text-gray-500">
                <span class="flex items-center gap-1.5"
                  ><svg
                    data-prefix="fas"
                    data-icon="phone"
                    class="svg-inline--fa fa-phone text-xs"
                    role="img"
                    viewBox="0 0 512 512"
                    aria-hidden="true"
                  >
                    <path
                      fill="currentColor"
                      d="M160.2 25C152.3 6.1 131.7-3.9 112.1 1.4l-5.5 1.5c-64.6 17.6-119.8 80.2-103.7 156.4 37.1 175 174.8 312.7 349.8 349.8 76.3 16.2 138.8-39.1 156.4-103.7l1.5-5.5c5.4-19.7-4.7-40.3-23.5-48.1l-97.3-40.5c-16.5-6.9-35.6-2.1-47 11.8l-38.6 47.2C233.9 335.4 177.3 277 144.8 205.3L189 169.3c13.9-11.3 18.6-30.4 11.8-47L160.2 25z"
                    ></path>
                  </svg>
                  {{ address.phone }}
                </span>
                <span class="flex items-center gap-1.5"
                  ><svg
                    data-prefix="fas"
                    data-icon="city"
                    class="svg-inline--fa fa-city text-xs"
                    role="img"
                    viewBox="0 0 576 512"
                    aria-hidden="true"
                  >
                    <path
                      fill="currentColor"
                      d="M320 0c-35.3 0-64 28.7-64 64l0 32-48 0 0-72c0-13.3-10.7-24-24-24s-24 10.7-24 24l0 72-64 0 0-72C96 10.7 85.3 0 72 0S48 10.7 48 24l0 74c-27.6 7.1-48 32.2-48 62L0 448c0 35.3 28.7 64 64 64l448 0c35.3 0 64-28.7 64-64l0-192c0-35.3-28.7-64-64-64l-64 0 0-128c0-35.3-28.7-64-64-64L320 0zm64 112l0 32c0 8.8-7.2 16-16 16l-32 0c-8.8 0-16-7.2-16-16l0-32c0-8.8 7.2-16 16-16l32 0c8.8 0 16 7.2 16 16zm-16 80c8.8 0 16 7.2 16 16l0 32c0 8.8-7.2 16-16 16l-32 0c-8.8 0-16-7.2-16-16l0-32c0-8.8 7.2-16 16-16l32 0zm16 112l0 32c0 8.8-7.2 16-16 16l-32 0c-8.8 0-16-7.2-16-16l0-32c0-8.8 7.2-16 16-16l32 0c8.8 0 16 7.2 16 16zm112-16c8.8 0 16 7.2 16 16l0 32c0 8.8-7.2 16-16 16l-32 0c-8.8 0-16-7.2-16-16l0-32c0-8.8 7.2-16 16-16l32 0zM256 304l0 32c0 8.8-7.2 16-16 16l-32 0c-8.8 0-16-7.2-16-16l0-32c0-8.8 7.2-16 16-16l32 0c8.8 0 16 7.2 16 16zM240 192c8.8 0 16 7.2 16 16l0 32c0 8.8-7.2 16-16 16l-32 0c-8.8 0-16-7.2-16-16l0-32c0-8.8 7.2-16 16-16l32 0zM128 304l0 32c0 8.8-7.2 16-16 16l-32 0c-8.8 0-16-7.2-16-16l0-32c0-8.8 7.2-16 16-16l32 0c8.8 0 16 7.2 16 16zM112 192c8.8 0 16 7.2 16 16l0 32c0 8.8-7.2 16-16 16l-32 0c-8.8 0-16-7.2-16-16l0-32c0-8.8 7.2-16 16-16l32 0z"
                    ></path>
                  </svg>
                  {{ address.city }}
                </span>
              </div>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <button
              class="w-9 h-9 rounded-lg bg-gray-100 text-gray-600 hover:bg-primary hover:text-primary flex items-center justify-center transition-colors"
              title="Edit address"
              fdprocessedid="l7efts"
              (click)="onOpenEditAddress(address)"
            >
              <svg
                data-prefix="fas"
                data-icon="pen"
                class="svg-inline--fa fa-pen text-sm"
                role="img"
                viewBox="0 0 512 512"
                aria-hidden="true"
              >
                <path
                  fill="currentColor"
                  d="M352.9 21.2L308 66.1 445.9 204 490.8 159.1C504.4 145.6 512 127.2 512 108s-7.6-37.6-21.2-51.1L455.1 21.2C441.6 7.6 423.2 0 404 0s-37.6 7.6-51.1 21.2zM274.1 100L58.9 315.1c-10.7 10.7-18.5 24.1-22.6 38.7L.9 481.6c-2.3 8.3 0 17.3 6.2 23.4s15.1 8.5 23.4 6.2l127.8-35.5c14.6-4.1 27.9-11.8 38.7-22.6L412 237.9 274.1 100z"
                ></path>
              </svg></button
            ><button
              class="w-9 h-9 rounded-lg bg-gray-100 text-gray-600 hover:bg-red-100 hover:text-red-600 flex items-center justify-center transition-colors disabled:opacity-50"
              title="Delete address"
              fdprocessedid="gdxr"
              (click)="deleteAddress(address._id)"
            >
              <svg
                data-prefix="fas"
                data-icon="trash"
                class="svg-inline--fa fa-trash text-sm"
                role="img"
                viewBox="0 0 448 512"
                aria-hidden="true"
              >
                <path
                  fill="currentColor"
                  d="M136.7 5.9L128 32 32 32C14.3 32 0 46.3 0 64S14.3 96 32 96l384 0c17.7 0 32-14.3 32-32s-14.3-32-32-32l-96 0-8.7-26.1C306.9-7.2 294.7-16 280.9-16L167.1-16c-13.8 0-26 8.8-30.4 21.9zM416 144L32 144 53.1 467.1C54.7 492.4 75.7 512 101 512L347 512c25.3 0 46.3-19.6 47.9-44.9L416 144z"
                ></path>
              </svg>
            </button>
          </div>
        </div>
      </div>
    }
  </div>

  <!-- Modal moved outside the loop -->
  @if (modeAddress()) {
    <app-edit-address
      [mode]="modeAddress()!"
      [address]="selectedAddress()"
      (close)="onCloseAddress()"
    ></app-edit-address>
  }
</div>
